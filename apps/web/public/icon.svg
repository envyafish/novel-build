<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- solid green background — works at 16px -->
  <rect width="32" height="32" rx="7" fill="#16a34a"/>
  <!-- pen nib — tip points DOWN, top is wide shoulder -->
  <path d="M16 27 L11 6 L13.8 6.5 L14.7 18 L16 24 L17.3 18 L18.2 6.5 L21 6 Z" fill="#fff"/>
  <!-- slit line -->
  <line x1="16" y1="9" x2="16" y2="22" stroke="#16a34a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- sparkle — upper right, small but crisp -->
  <circle cx="26" cy="6" r="1.8" fill="#facc15"/>
  <line x1="26" y1="2.5" x2="26" y2="9.5" stroke="#facc15" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="22.5" y1="6" x2="29.5" y2="6" stroke="#facc15" stroke-width="0.9" stroke-linecap="round"/>
</svg>
